services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: decolog
      POSTGRES_USER: decolog_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=postgres://decolog_user:${DB_PASSWORD}@db/decolog
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
    volumes:
      - static_files:/app/staticfiles

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - static_files:/app/staticfiles
      - ./nginx/decolog.conf:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
  static_files:
