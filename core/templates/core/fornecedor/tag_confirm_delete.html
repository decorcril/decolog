{% extends 'base.html' %}
{% block title %}Excluir Tag — Decolog{% endblock %}

{% block content %}
<div class="page-centered">
  <div class="col-md-6 col-lg-4">
    <div class="card">
      <div class="card-body p-4 text-center">
        <div class="rounded-circle bg-danger bg-opacity-10 p-3 d-inline-flex mb-3">
          <i class="bi bi-trash text-danger fs-4"></i>
        </div>
        <h5 class="fw-bold mb-1">Excluir Tag</h5>
        <p class="text-muted small mb-4">
          Tem certeza que deseja excluir a tag <strong>{{ tag.nome }}</strong>?
          Ela será removida de todos os fornecedores vinculados.
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-trash me-1"></i> Excluir
            </button>
            <a href="{% url 'core:tag_list' %}" class="btn btn-outline-secondary px-4">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
