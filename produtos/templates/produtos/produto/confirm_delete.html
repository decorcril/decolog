{% extends 'base.html' %}
{% block title %}Excluir Produto — Decolog{% endblock %}

{% block content %}
<div class="page-centered">
  <div class="col-md-6 col-lg-4">
    <div class="card">
      <div class="card-body p-4 text-center">
        
        <h5 class="fw-bold mb-1">Excluir Produto</h5>
        <p class="text-muted small mb-4">
          Tem certeza que deseja excluir <strong>{{ produto.nome }}</strong>?
          Esta ação não pode ser desfeita.
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-trash me-1"></i> Excluir
            </button>
            <a href="{% url 'produtos:lista' %}" class="btn btn-outline-secondary px-4">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
