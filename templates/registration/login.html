{% extends 'base.html' %}

{% block title %}Login — Decolog{% endblock %}

{% block unauthenticated_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background-color: #f5f6fa;">
  <div class="card shadow-sm border-0" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <h4 class="fw-bold mb-0">Deco<span style="color: #4da3ff;">log</span></h4>
        <p class="text-muted small mt-1">Controle de Estoque</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_username" class="form-label">Usuário</label>
          <input type="text" name="username" id="id_username" class="form-control" autofocus required>
        </div>
        <div class="mb-3">
          <label for="id_password" class="form-label">Senha</label>
          <input type="password" name="password" id="id_password" class="form-control" required>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2 small">
          Usuário ou senha inválidos.
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary w-100 mt-2">Entrar</button>
      </form>

    </div>
  </div>
</div>
{% endblock %}
